<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>自由なお世話モード</title>

  <style>
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, #fff8fd 0%, #eef7ff 100%);
      color: #444;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .app {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
      text-align: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.92);
      border-radius: 28px;
      padding: 22px;
      box-shadow: 0 12px 30px rgba(120, 160, 200, 0.18);
      margin-top: 18px;
    }

    h1 {
      font-size: 24px;
      margin: 14px 0 8px;
      color: #4c7fcf;
    }

    h2 {
      font-size: 19px;
      color: #4c7fcf;
      margin: 10px 0;
    }

    p {
      font-size: 15px;
      line-height: 1.8;
      margin: 10px 0;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 13px 18px;
      margin: 8px 4px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #79c7ff, #9d8cff);
      color: white;
      box-shadow: 0 6px 14px rgba(90, 130, 200, 0.22);
    }

    button.secondary {
      background: #fff;
      color: #5b78aa;
      border: 2px solid #cfe3ff;
      box-shadow: none;
    }

    button.danger {
      background: #fff;
      color: #d15a5a;
      border: 2px solid #ffd2d2;
      box-shadow: none;
    }

    input {
      width: 90%;
      padding: 13px 14px;
      border-radius: 16px;
      border: 2px solid #cfe3ff;
      font-size: 16px;
      box-sizing: border-box;
      text-align: center;
      margin-top: 12px;
    }

    .gift {
      width: 140px;
      height: 130px;
      margin: 22px auto;
      position: relative;
      cursor: pointer;
      animation: float 2.3s ease-in-out infinite;
    }

    .gift-box {
      width: 120px;
      height: 90px;
      background: linear-gradient(135deg, #ffb6df, #b7dcff);
      border-radius: 22px;
      position: absolute;
      bottom: 0;
      left: 10px;
      box-shadow: 0 12px 22px rgba(120, 140, 180, 0.22);
    }

    .gift-lid {
      width: 132px;
      height: 34px;
      background: linear-gradient(135deg, #ff8fd0, #80cfff);
      border-radius: 18px;
      position: absolute;
      top: 18px;
      left: 4px;
    }

    .gift-ribbon-v {
      width: 22px;
      height: 112px;
      background: rgba(255, 255, 255, 0.75);
      border-radius: 12px;
      position: absolute;
      left: 59px;
      top: 18px;
    }

    .gift-ribbon-h {
      width: 132px;
      height: 20px;
      background: rgba(255, 255, 255, 0.75);
      border-radius: 12px;
      position: absolute;
      left: 4px;
      top: 56px;
    }

    .macaron {
      width: 155px;
      height: 105px;
      margin: 28px auto;
      position: relative;
      cursor: pointer;
      animation: pop 0.8s ease, float 2.5s ease-in-out infinite;
    }

    .macaron-top,
    .macaron-bottom {
      width: 155px;
      height: 50px;
      background: linear-gradient(135deg, #9fdcff, #d6b8ff);
      border-radius: 80px 80px 34px 34px;
      box-shadow: inset 0 8px 10px rgba(255,255,255,0.55);
    }

    .macaron-cream {
      width: 145px;
      height: 24px;
      background: #fff6dc;
      border-radius: 999px;
      margin: -5px auto;
      box-shadow: 0 2px 8px rgba(180, 150, 100, 0.12);
    }

    .macaron-bottom {
      border-radius: 34px 34px 80px 80px;
      transform: translateY(-2px);
    }

    .pet-area {
      position: relative;
      min-height: 260px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .pet-img {
      width: 230px;
      max-width: 86%;
      image-rendering: auto;
      animation: petBreath 2.4s ease-in-out infinite;
      cursor: pointer;
      user-select: none;
    }

    .fallback-pet {
      width: 190px;
      height: 190px;
      border-radius: 48% 48% 42% 42%;
      background: radial-gradient(circle at 35% 25%, #e5fbff, #5eb8ff 50%, #4b8ee8 100%);
      margin: 20px auto;
      position: relative;
      animation: petBreath 2.4s ease-in-out infinite;
    }

    .fallback-pet::before,
    .fallback-pet::after {
      content: "";
      position: absolute;
      width: 58px;
      height: 95px;
      border-radius: 50%;
      background: linear-gradient(180deg, #7fe3ff, #5aa9ff);
      top: -56px;
    }

    .fallback-pet::before {
      left: 34px;
      transform: rotate(-18deg);
    }

    .fallback-pet::after {
      right: 34px;
      transform: rotate(18deg);
    }

    .fallback-face {
      position: absolute;
      top: 78px;
      left: 0;
      right: 0;
      font-size: 34px;
    }

    .message {
      min-height: 50px;
      background: #f7fbff;
      border: 2px solid #d8ecff;
      border-radius: 20px;
      padding: 12px;
      font-size: 15px;
      line-height: 1.7;
      margin-top: 10px;
    }

    .status {
      margin: 14px 0 10px;
      text-align: left;
    }

    .bar-row {
      margin: 10px 0;
    }

    .bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 4px;
      color: #5a6f8e;
    }

    .bar {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      background: #edf4ff;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #80d5ff, #b895ff);
      width: 50%;
      transition: width 0.25s ease;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 14px;
    }

    .actions button {
      width: 100%;
      margin: 0;
      padding: 13px 8px;
    }

    .choice-box {
      margin-top: 16px;
      background: #fffaf2;
      border: 2px solid #ffe2b8;
      border-radius: 22px;
      padding: 14px;
      display: none;
    }

    .mini-game {
      margin-top: 16px;
      background: #f7fbff;
      border: 2px solid #d8ecff;
      border-radius: 22px;
      padding: 14px;
      display: none;
    }

    .poop-field {
      position: relative;
      height: 160px;
      border-radius: 20px;
      background: linear-gradient(180deg, #effaff, #fff);
      overflow: hidden;
      margin-top: 12px;
    }

    .poop {
      position: absolute;
      font-size: 28px;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.2s ease;
    }

    .poop.cleaned {
      transform: scale(0);
      opacity: 0;
      pointer-events: none;
    }

    .heart {
      position: absolute;
      font-size: 24px;
      animation: heartUp 1.3s ease-out forwards;
      pointer-events: none;
    }

    .small {
      font-size: 12px;
      color: #7c8da5;
      line-height: 1.6;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes pop {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes petBreath {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.035); }
    }

    @keyframes heartUp {
      0% {
        opacity: 1;
        transform: translateY(0) scale(0.8);
      }
      100% {
        opacity: 0;
        transform: translateY(-95px) scale(1.4);
      }
    }
  </style>
</head>

<body>
  <div class="app" id="app"></div>

  <script>
    const STORAGE_KEY = "free_care_mode_pet_v1";

    const CHARACTERS = [
      {
        id: "kangaroo_blue",
        happy: "public/assets/characters/kangaroo_blue/happy.png",
        sad: "public/assets/characters/kangaroo_blue/sad.png"
      },
      {
        id: "penguin_yellow",
        happy: "public/assets/characters/penguin_yellow/happy.png",
        sad: "public/assets/characters/penguin_yellow/sad.png"
      },
      {
        id: "rabbit_pink",
        happy: "public/assets/characters/rabbit_pink/happy.png",
        sad: "public/assets/characters/rabbit_pink/sad.png"
      },
      {
        id: "seal_gray",
        happy: "public/assets/characters/seal_gray/happy.png",
        sad: "public/assets/characters/seal_gray/sad.png"
      },
      {
        id: "lizard_green",
        happy: "public/assets/characters/lizard_green/happy.png",
        sad: "public/assets/characters/lizard_green/sad.png"
      },
      {
        id: "cat_purple",
        happy: "public/assets/characters/cat_purple/happy.png",
        sad: "public/assets/characters/cat_purple/sad.png"
      }
    ];

    let state = {
      screen: "start",
      petName: "",
      characterId: "",
      mood: "happy",
      affection: 55,
      hunger: 60,
      cleanliness: 70,
      energy: 65,
      message: "その相棒と自由にお世話を続けましょう。"
    };

    const app = document.getElementById("app");

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function load() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;

      try {
        const saved = JSON.parse(raw);
        state = { ...state, ...saved };

        if (state.mood === "sleep") {
          state.mood = "happy";
        }
      } catch (e) {
        localStorage.removeItem(STORAGE_KEY);
      }
    }

    function clamp(value) {
      return Math.max(0, Math.min(100, value));
    }

    function getCharacter() {
      return CHARACTERS.find(c => c.id === state.characterId) || CHARACTERS[0];
    }

    function getPetImage() {
      const character = getCharacter();

      if (state.mood === "sad") {
        return character.sad;
      }

      return character.happy;
    }

    function setMessage(text) {
      state.message = text;
      save();
      render();
    }

    function showStart() {
      app.innerHTML = `
        <div class="card">
          <h1>自由なお世話モード</h1>
          <p>
            ここでは、相棒と自由にお世話を続けられます。
          </p>
          <p>
            ごはんをあげたり、おでかけしたり、なでたり、きれいにしたりしながら、
            その相棒との時間を楽しんでください。
          </p>
          <button onclick="goGift()">はじめる</button>
        </div>
      `;
    }

    function goGift() {
      state.screen = "gift";
      save();
      render();
    }

    function showGift() {
      app.innerHTML = `
        <div class="card">
          <h2>プレゼントが届きました</h2>
          <p>プレゼントをクリックしてみてね。</p>

          <div class="gift" onclick="openGift()">
            <div class="gift-lid"></div>
            <div class="gift-box"></div>
            <div class="gift-ribbon-v"></div>
            <div class="gift-ribbon-h"></div>
          </div>

          <p class="small">この自由モードでは、研究用の条件変化はありません。</p>
        </div>
      `;
    }

    function openGift() {
      state.screen = "macaron";
      save();
      render();
    }

    function showMacaron() {
      app.innerHTML = `
        <div class="card">
          <h2>マカロンが出てきました</h2>
          <p>マカロンをクリックしてみてね。</p>

          <div class="macaron" onclick="birthPet()">
            <div class="macaron-top"></div>
            <div class="macaron-cream"></div>
            <div class="macaron-bottom"></div>
          </div>
        </div>
      `;
    }

    function birthPet() {
      const randomCharacter = CHARACTERS[Math.floor(Math.random() * CHARACTERS.length)];

      state.characterId = randomCharacter.id;
      state.screen = "name";
      state.mood = "happy";
      state.affection = 55;
      state.hunger = 60;
      state.cleanliness = 70;
      state.energy = 65;
      state.message = "名前をつけてね。";

      save();
      render();
    }

    function showNameInput() {
      const img = getPetImage();

      app.innerHTML = `
        <div class="card">
          <h2>名前をつけてね</h2>

          <div class="pet-area">
            <img class="pet-img" src="${img}" alt="相棒" onerror="showFallbackPet(this)">
          </div>

          <input id="petNameInput" type="text" maxlength="12" placeholder="名前を入力" />
          <br>
          <button onclick="savePetName()">この名前にする</button>
        </div>
      `;
    }

    function savePetName() {
      const input = document.getElementById("petNameInput");
      const name = input.value.trim();

      if (!name) {
        alert("名前を入力してください。");
        return;
      }

      state.petName = name;
      state.screen = "care";
      state.message = `${state.petName}と自由にお世話を続けましょう。`;

      save();
      render();
    }

    function showCare() {
      const img = getPetImage();

      app.innerHTML = `
        <div class="card">
          <h1>${escapeHtml(state.petName)}</h1>

          <div class="pet-area" id="petArea">
            <img class="pet-img" src="${img}" alt="相棒" onclick="petTouch()" onerror="showFallbackPet(this)">
          </div>

          <div class="message">${escapeHtml(state.message)}</div>

          <div class="status">
            ${bar("なかよし", state.affection)}
            ${bar("おなか", state.hunger)}
            ${bar("きれい", state.cleanliness)}
            ${bar("げんき", state.energy)}
          </div>

          <div class="actions">
            <button onclick="showFoodChoices()">ごはん</button>
            <button onclick="showWalkChoices()">おでかけ</button>
            <button onclick="petTouch()">なでる</button>
            <button onclick="startCleanGame()">きれいにする</button>
          </div>

          <div class="choice-box" id="choiceBox"></div>

          <div class="mini-game" id="cleanGame"></div>

          <button class="secondary" onclick="smallRest()">様子を見る</button>
          <button class="danger" onclick="resetGame()">リセット</button>
        </div>
      `;
    }

    function bar(label, value) {
      const safeValue = clamp(value);
      return `
        <div class="bar-row">
          <div class="bar-label">
            <span>${label}</span>
            <span>${safeValue}</span>
          </div>
          <div class="bar">
            <div class="bar-fill" style="width:${safeValue}%"></div>
          </div>
        </div>
      `;
    }

    function showFoodChoices() {
      hideCleanGame();

      const box = document.getElementById("choiceBox");
      box.style.display = "block";
      box.innerHTML = `
        <h2>ごはんを選んでね</h2>
        <button onclick="giveFood('macaron')">小さなマカロン</button>
        <button onclick="giveFood('milk')">ふわふわミルク</button>
      `;
    }

    function giveFood(type) {
      if (type === "macaron") {
        state.hunger = clamp(state.hunger + 20);
        state.affection = clamp(state.affection + 8);
        state.energy = clamp(state.energy + 5);
        state.mood = "happy";
        state.message = `${state.petName}は小さなマカロンをうれしそうに食べています。`;
      } else {
        state.hunger = clamp(state.hunger + 15);
        state.affection = clamp(state.affection + 10);
        state.energy = clamp(state.energy + 8);
        state.mood = "happy";
        state.message = `${state.petName}はふわふわミルクでほっとしています。`;
      }

      save();
      render();
    }

    function showWalkChoices() {
      hideCleanGame();

      const box = document.getElementById("choiceBox");
      box.style.display = "block";
      box.innerHTML = `
        <h2>どこへ行く？</h2>
        <button onclick="goWalk('park')">雲の公園</button>
        <button onclick="goWalk('star')">星の丘</button>
      `;
    }

    function goWalk(place) {
      if (place === "park") {
        state.energy = clamp(state.energy - 10);
        state.affection = clamp(state.affection + 12);
        state.cleanliness = clamp(state.cleanliness - 8);
        state.mood = "happy";
        state.message = `${state.petName}は雲の公園で楽しそうに遊びました。`;
      } else {
        state.energy = clamp(state.energy - 12);
        state.affection = clamp(state.affection + 14);
        state.cleanliness = clamp(state.cleanliness - 6);
        state.mood = "happy";
        state.message = `${state.petName}は星の丘で空を見上げています。`;
      }

      save();
      render();
    }

    function petTouch() {
      state.affection = clamp(state.affection + 8);
      state.energy = clamp(state.energy + 2);
      state.mood = "happy";
      state.message = `${state.petName}はうれしそうです。`;

      save();
      render();

      setTimeout(makeHearts, 40);
    }

    function makeHearts() {
      const area = document.getElementById("petArea");
      if (!area) return;

      for (let i = 0; i < 12; i++) {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.textContent = ["💙", "💜", "💗", "✨"][Math.floor(Math.random() * 4)];
        heart.style.left = `${80 + Math.random() * 180}px`;
        heart.style.top = `${120 + Math.random() * 70}px`;
        heart.style.animationDelay = `${Math.random() * 0.25}s`;
        area.appendChild(heart);

        setTimeout(() => {
          heart.remove();
        }, 1600);
      }
    }

    function startCleanGame() {
      const choiceBox = document.getElementById("choiceBox");
      if (choiceBox) {
        choiceBox.style.display = "none";
        choiceBox.innerHTML = "";
      }

      const game = document.getElementById("cleanGame");
      game.style.display = "block";
      game.innerHTML = `
        <h2>きれいにしよう</h2>
        <p>うんちをクリックして片づけてね。</p>
        <div class="poop-field" id="poopField"></div>
      `;

      const field = document.getElementById("poopField");

      const positions = [
        { left: 26, top: 28 },
        { left: 115, top: 58 },
        { left: 245, top: 30 },
        { left: 70, top: 112 },
        { left: 295, top: 105 }
      ];

      positions.forEach((pos, index) => {
        const poop = document.createElement("div");
        poop.className = "poop";
        poop.textContent = "💩";
        poop.style.left = `${pos.left}px`;
        poop.style.top = `${pos.top}px`;
        poop.dataset.cleaned = "false";
        poop.onclick = () => cleanPoop(poop);
        field.appendChild(poop);
      });
    }

    function cleanPoop(poop) {
      poop.classList.add("cleaned");
      poop.dataset.cleaned = "true";

      const allPoops = Array.from(document.querySelectorAll(".poop"));
      const allCleaned = allPoops.every(p => p.dataset.cleaned === "true");

      if (allCleaned) {
        state.cleanliness = clamp(state.cleanliness + 25);
        state.affection = clamp(state.affection + 6);
        state.mood = "happy";
        state.message = `${state.petName}のまわりがきれいになりました。`;

        save();

        setTimeout(() => {
          render();
        }, 450);
      }
    }

    function hideCleanGame() {
      const game = document.getElementById("cleanGame");
      if (game) {
        game.style.display = "none";
        game.innerHTML = "";
      }
    }

    function smallRest() {
      state.energy = clamp(state.energy + 8);
      state.hunger = clamp(state.hunger - 3);

      if (state.hunger < 25 || state.cleanliness < 25) {
        state.mood = "sad";
        state.message = `${state.petName}は少し気にしているみたいです。お世話してあげるとよさそうです。`;
      } else {
        state.mood = "happy";
        state.message = `${state.petName}はそばでのんびりしています。`;
      }

      save();
      render();
    }

    function resetGame() {
      const ok = confirm("自由なお世話モードを最初からやり直しますか？");

      if (!ok) return;

      localStorage.removeItem(STORAGE_KEY);

      state = {
        screen: "start",
        petName: "",
        characterId: "",
        mood: "happy",
        affection: 55,
        hunger: 60,
        cleanliness: 70,
        energy: 65,
        message: "その相棒と自由にお世話を続けましょう。"
      };

      render();
    }

    function showFallbackPet(img) {
      img.outerHTML = `
        <div class="fallback-pet" onclick="petTouch()">
          <div class="fallback-face">´ ᴗ \`</div>
        </div>
      `;
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function render() {
      if (state.screen === "start") {
        showStart();
      } else if (state.screen === "gift") {
        showGift();
      } else if (state.screen === "macaron") {
        showMacaron();
      } else if (state.screen === "name") {
        showNameInput();
      } else if (state.screen === "care") {
        showCare();
      } else {
        state.screen = "start";
        save();
        showStart();
      }
    }

    load();
    render();
  </script>
</body>
</html>
