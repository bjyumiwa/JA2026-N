<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>自由なお世話モード</title>

  <style>
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, #fff8fd 0%, #eef7ff 100%);
      color: #444;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      transition: background 0.4s ease;
    }

    body.low-status-mode {
      background: linear-gradient(180deg, #dce8ff 0%, #cfd9ff 46%, #bfc7f0 100%);
    }

    .app {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
      text-align: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.92);
      border-radius: 28px;
      padding: 22px;
      box-shadow: 0 12px 30px rgba(120, 160, 200, 0.18);
      margin-top: 18px;
      transition: filter 0.35s ease;
    }

    body.low-status-mode .card {
      filter: brightness(0.86) saturate(0.86);
    }

    h1 {
      font-size: 24px;
      margin: 14px 0 8px;
      color: #4c7fcf;
    }

    h2 {
      font-size: 19px;
      color: #4c7fcf;
      margin: 10px 0;
    }

    p {
      font-size: 15px;
      line-height: 1.8;
      margin: 10px 0;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 13px 18px;
      margin: 8px 4px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #79c7ff, #9d8cff);
      color: white;
      box-shadow: 0 6px 14px rgba(90, 130, 200, 0.22);
    }

    button.secondary {
      background: #fff;
      color: #5b78aa;
      border: 2px solid #cfe3ff;
      box-shadow: none;
    }

    button.danger {
      background: #fff;
      color: #d15a5a;
      border: 2px solid #ffd2d2;
      box-shadow: none;
    }

    input {
      width: 90%;
      padding: 13px 14px;
      border-radius: 16px;
      border: 2px solid #cfe3ff;
      font-size: 16px;
      box-sizing: border-box;
      text-align: center;
      margin-top: 12px;
    }

    .gift {
      width: 140px;
      height: 130px;
      margin: 22px auto;
      position: relative;
      cursor: pointer;
      animation: float 2.3s ease-in-out infinite;
    }

    .gift-img {
      width: 165px;
      max-width: 78%;
      margin: 22px auto;
      display: block;
      cursor: pointer;
      animation: pop 0.8s ease, float 2.4s ease-in-out infinite;
      user-select: none;
      filter: drop-shadow(0 14px 24px rgba(120, 140, 180, 0.22));
    }

    .gift-box {
      width: 120px;
      height: 90px;
      background: linear-gradient(135deg, #ffb6df, #b7dcff);
      border-radius: 22px;
      position: absolute;
      bottom: 0;
      left: 10px;
      box-shadow: 0 12px 22px rgba(120, 140, 180, 0.22);
    }

    .gift-lid {
      width: 132px;
      height: 34px;
      background: linear-gradient(135deg, #ff8fd0, #80cfff);
      border-radius: 18px;
      position: absolute;
      top: 18px;
      left: 4px;
    }

    .gift-ribbon-v {
      width: 22px;
      height: 112px;
      background: rgba(255, 255, 255, 0.75);
      border-radius: 12px;
      position: absolute;
      left: 59px;
      top: 18px;
    }

    .gift-ribbon-h {
      width: 132px;
      height: 20px;
      background: rgba(255, 255, 255, 0.75);
      border-radius: 12px;
      position: absolute;
      left: 4px;
      top: 56px;
    }

    .macaron {
      width: 155px;
      height: 105px;
      margin: 28px auto;
      position: relative;
      cursor: pointer;
      animation: pop 0.8s ease, float 2.5s ease-in-out infinite;
    }

    .macaron-img {
      width: 170px;
      max-width: 78%;
      margin: 28px auto;
      display: block;
      cursor: pointer;
      animation: pop 0.8s ease, float 2.5s ease-in-out infinite;
      user-select: none;
      filter: drop-shadow(0 12px 18px rgba(120, 140, 180, 0.18));
    }

    .macaron-wait-box {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 20px;
      background: #f7fbff;
      border: 2px solid #d8ecff;
      color: #5a6f8e;
      font-size: 14px;
      line-height: 1.7;
    }

    .macaron-countdown {
      font-size: 28px;
      font-weight: 800;
      color: #4c7fcf;
      margin: 4px 0;
    }

    .macaron-progress {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: #edf4ff;
      overflow: hidden;
      margin-top: 8px;
    }

    .macaron-progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #80d5ff, #b895ff);
      width: 0%;
      transition: width 0.35s ease;
    }

    .macaron-top,
    .macaron-bottom {
      width: 155px;
      height: 50px;
      background: linear-gradient(135deg, #9fdcff, #d6b8ff);
      border-radius: 80px 80px 34px 34px;
      box-shadow: inset 0 8px 10px rgba(255,255,255,0.55);
    }

    .macaron-cream {
      width: 145px;
      height: 24px;
      background: #fff6dc;
      border-radius: 999px;
      margin: -5px auto;
      box-shadow: 0 2px 8px rgba(180, 150, 100, 0.12);
    }

    .macaron-bottom {
      border-radius: 34px 34px 80px 80px;
      transform: translateY(-2px);
    }

    .pet-area {
      position: relative;
      min-height: 220px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .pet-img {
      width: 185px;
      max-width: 72%;
      image-rendering: auto;
      cursor: pointer;
      user-select: none;
      transform-origin: center bottom;
    }

    .motion-kangaroo_blue { animation: kangarooJump 1.15s ease-in-out infinite; }
    .motion-rabbit_pink { animation: rabbitHop 1.55s ease-in-out infinite; }
    .motion-seal_gray { animation: sealGoron 2.2s ease-in-out infinite; }
    .motion-cat_purple { animation: catAmae 2.0s ease-in-out infinite; }
    .motion-penguin_yellow { animation: penguinChokoChoko 1.45s ease-in-out infinite; }
    .motion-lizard_green { animation: lizardKyoroKyoro 2.1s ease-in-out infinite; }

    body.low-status-mode .pet-img {
      animation: shikuShiku 1.25s ease-in-out infinite !important;
      filter: brightness(0.84) saturate(0.82);
    }

    .fallback-pet {
      width: 155px;
      height: 155px;
      border-radius: 48% 48% 42% 42%;
      background: radial-gradient(circle at 35% 25%, #e5fbff, #5eb8ff 50%, #4b8ee8 100%);
      margin: 18px auto;
      position: relative;
      animation: petBreath 2.4s ease-in-out infinite;
    }

    .fallback-pet::before,
    .fallback-pet::after {
      content: "";
      position: absolute;
      width: 46px;
      height: 76px;
      border-radius: 50%;
      background: linear-gradient(180deg, #7fe3ff, #5aa9ff);
      top: -44px;
    }

    .fallback-pet::before { left: 28px; transform: rotate(-18deg); }
    .fallback-pet::after { right: 28px; transform: rotate(18deg); }

    .fallback-face {
      position: absolute;
      top: 60px;
      left: 0;
      right: 0;
      font-size: 28px;
    }

    .message {
      min-height: 50px;
      background: #f7fbff;
      border: 2px solid #d8ecff;
      border-radius: 20px;
      padding: 12px;
      font-size: 15px;
      line-height: 1.7;
      margin-top: 10px;
    }

    .collection-status {
      margin: 12px 0 10px;
      padding: 12px;
      border-radius: 20px;
      background: linear-gradient(135deg, #fff7fb, #f2f8ff);
      border: 2px solid #e7f1ff;
      text-align: left;
    }

    .collection-status-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: #5f6f98;
      font-size: 13px;
      font-weight: 700;
    }

    .heart-counter {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 15px;
      color: #e36f95;
    }

    .mini-progress {
      height: 10px;
      border-radius: 999px;
      background: #edf4ff;
      overflow: hidden;
      margin-top: 10px;
    }

    .mini-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff9cc4, #9dc8ff);
      border-radius: 999px;
      transition: width 0.25s ease;
    }

    .collection-open-btn {
      width: 100%;
      margin: 10px 0 0;
      padding: 10px 12px;
      font-size: 13px;
    }

    .sleep-panel {
      margin-top: 14px;
      padding: 15px;
      border-radius: 22px;
      background: linear-gradient(135deg, #f7fbff, #fff7fb);
      border: 2px solid #e7f1ff;
      color: #5f6f98;
      line-height: 1.7;
    }

    .sleep-panel-title {
      font-weight: 800;
      color: #4c7fcf;
      margin-bottom: 6px;
    }

    .daily-limit-note {
      margin-top: 10px;
      color: #7c8da5;
      font-size: 13px;
      line-height: 1.7;
    }

    .status {
      margin: 14px 0 10px;
      text-align: left;
    }

    .bar-row { margin: 10px 0; }

    .bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 4px;
      color: #5a6f8e;
    }

    .bar {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      background: #edf4ff;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #80d5ff, #b895ff);
      width: 50%;
      transition: width 0.25s ease;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 14px;
    }

    .actions button {
      width: 100%;
      margin: 0;
      padding: 13px 8px;
    }

    .choice-box {
      margin-top: 16px;
      background: #fffaf2;
      border: 2px solid #ffe2b8;
      border-radius: 22px;
      padding: 14px;
      display: none;
    }

    .mini-game {
      margin-top: 16px;
      background: #f7fbff;
      border: 2px solid #d8ecff;
      border-radius: 22px;
      padding: 14px;
      display: none;
    }

    .poop-field {
      position: relative;
      height: 160px;
      border-radius: 20px;
      background: linear-gradient(180deg, #effaff, #fff);
      overflow: hidden;
      margin-top: 12px;
    }

    .poop {
      position: absolute;
      font-size: 28px;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.2s ease;
    }

    .poop.cleaned {
      transform: scale(0);
      opacity: 0;
      pointer-events: none;
    }

    .heart {
      position: absolute;
      font-size: 24px;
      animation: heartUp 1.3s ease-out forwards;
      pointer-events: none;
    }

    .small {
      font-size: 12px;
      color: #7c8da5;
      line-height: 1.6;
    }

    .low-status-scene {
      position: fixed;
      inset: 0;
      z-index: 9000;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 16%, rgba(255, 255, 255, 0.14), transparent 10%),
        radial-gradient(circle at 82% 22%, rgba(255, 255, 255, 0.12), transparent 8%),
        linear-gradient(180deg, rgba(36, 42, 92, 0.48), rgba(18, 22, 58, 0.68));
      animation: lowStatusFadeIn 0.8s ease forwards;
    }

    .low-status-message {
      position: absolute;
      left: 50%;
      bottom: 105px;
      transform: translateX(-50%);
      width: min(86%, 330px);
      padding: 14px 18px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.9);
      color: #5f6390;
      text-align: center;
      box-shadow: 0 12px 28px rgba(40, 40, 80, 0.18);
      backdrop-filter: blur(6px);
    }

    .low-status-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .low-status-text {
      font-size: 13px;
      opacity: 0.9;
    }

    .tear-layer {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 140px;
      height: 145px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 20;
    }

    .tear {
      position: absolute;
      width: 8px;
      height: 12px;
      border-radius: 50% 50% 58% 58%;
      background: rgba(120, 190, 255, 0.9);
      box-shadow: 0 2px 8px rgba(120, 190, 255, 0.45);
      opacity: 0;
      animation: tearDrop 1.4s ease-in infinite;
    }

    .tear.left { left: 42px; top: 52px; }
    .tear.right { right: 42px; top: 52px; animation-delay: 0.45s; }
    .tear.center { left: 66px; top: 64px; animation-delay: 0.9s; }

    .reward-message {
      position: fixed;
      left: 50%;
      top: 42%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.96);
      border-radius: 24px;
      padding: 22px 28px;
      box-shadow: 0 12px 32px rgba(120, 120, 180, 0.25);
      text-align: center;
      z-index: 10000;
      font-weight: 700;
      color: #6f6fa8;
      pointer-events: none;
      animation: rewardPop 2.3s ease forwards;
    }

    .reward-heart {
      font-size: 42px;
      margin-bottom: 8px;
      animation: heartFloat 1.2s ease-in-out infinite;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 12000;
      background: rgba(30, 34, 72, 0.38);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
      box-sizing: border-box;
    }

    .modal-card {
      width: min(100%, 390px);
      max-height: 86vh;
      overflow: auto;
      background: rgba(255, 255, 255, 0.98);
      border-radius: 28px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 18px 50px rgba(40, 40, 80, 0.26);
    }

    .gift-title {
      color: #e36f95;
      font-size: 20px;
      margin: 6px 0 8px;
      font-weight: 800;
    }

    .silhouette-big {
      width: 150px;
      max-width: 70%;
      margin: 12px auto 8px;
      display: block;
      border-radius: 18px;
      background: #fffaf7;
    }

    .silhouette-name {
      font-size: 22px;
      color: #4c5f91;
      font-weight: 800;
      margin: 8px 0 4px;
    }

    .silhouette-type {
      font-size: 14px;
      color: #e36f95;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .collection-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    .collection-item {
      border-radius: 14px;
      background: #fff7fb;
      border: 1px solid #f4ddec;
      min-height: 72px;
      padding: 6px 3px;
      box-sizing: border-box;
      font-size: 10px;
      color: #5f6f98;
    }

    .collection-item.locked {
      background: #f2f4f8;
      color: #a8afbd;
      filter: grayscale(1);
      opacity: 0.68;
    }

    .collection-item img {
      width: 50px;
      height: 38px;
      object-fit: contain;
      display: block;
      margin: 0 auto 3px;
    }

    .collection-item.locked img {
      opacity: 0.18;
    }

    .collection-number {
      font-weight: 800;
      color: #e36f95;
    }

    .achievementOverlay {
      position: fixed;
      inset: 0;
      z-index: 15000;
      background:
        radial-gradient(circle at 50% 22%, rgba(255, 225, 120, 0.42), transparent 28%),
        radial-gradient(circle at 20% 20%, rgba(255, 170, 220, 0.18), transparent 18%),
        radial-gradient(circle at 80% 26%, rgba(150, 190, 255, 0.18), transparent 20%),
        rgba(18, 22, 58, 0.72);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
      box-sizing: border-box;
      animation: achievementFadeIn 0.45s ease forwards;
    }

    .achievementCard {
      width: min(100%, 390px);
      border-radius: 32px;
      padding: 24px 20px 20px;
      box-sizing: border-box;
      text-align: center;
      background: linear-gradient(180deg, #fff8dc 0%, #fffdf7 52%, #fff5e4 100%);
      border: 4px solid rgba(245, 197, 92, 0.88);
      box-shadow:
        0 22px 60px rgba(20, 20, 60, 0.32),
        inset 0 0 0 2px rgba(255, 255, 255, 0.75);
      position: relative;
      overflow: hidden;
      animation: achievementPop 0.55s ease-out forwards;
    }

    .achievementCard::before,
    .achievementCard::after {
      content: "✦ ✧ ✦";
      position: absolute;
      color: rgba(236, 177, 52, 0.6);
      font-size: 22px;
      top: 18px;
    }

    .achievementCard::before {
      left: 18px;
    }

    .achievementCard::after {
      right: 18px;
    }

    .crownIcon {
      font-size: 58px;
      line-height: 1;
      margin-bottom: 4px;
      filter: drop-shadow(0 8px 10px rgba(180, 120, 20, 0.28));
      animation: crownFloat 1.8s ease-in-out infinite;
    }

    .achievementRibbon {
      display: inline-block;
      padding: 9px 22px;
      border-radius: 999px;
      background: linear-gradient(135deg, #ff8aa8, #ffb3c6);
      color: #fff;
      font-size: 21px;
      font-weight: 900;
      text-shadow: 0 2px 4px rgba(150, 60, 80, 0.25);
      box-shadow: 0 8px 18px rgba(230, 100, 140, 0.24);
      margin-bottom: 8px;
    }

    .bigNumber {
      font-size: 76px;
      line-height: 1;
      font-weight: 900;
      color: #f2b52d;
      -webkit-text-stroke: 2px #b97b10;
      text-shadow:
        0 4px 0 rgba(255, 255, 255, 0.65),
        0 8px 16px rgba(210, 150, 30, 0.25);
      margin: 8px 0 6px;
    }

    .achievementSubtitle {
      font-size: 22px;
      font-weight: 900;
      color: #704a1f;
      margin: 4px 0 12px;
    }

    .achievementDivider {
      width: 86%;
      height: 2px;
      margin: 8px auto 14px;
      border-radius: 999px;
      background: repeating-linear-gradient(
        90deg,
        rgba(220, 170, 95, 0.5) 0,
        rgba(220, 170, 95, 0.5) 5px,
        transparent 5px,
        transparent 11px
      );
    }

    .achievementText {
      font-size: 14px;
      line-height: 1.85;
      color: #644325;
      font-weight: 700;
      margin: 10px 0 14px;
    }

    .achievementBadge {
      margin: 10px auto 8px;
      width: 82%;
      padding: 10px 12px;
      border-radius: 18px;
      background: linear-gradient(180deg, #fff4ca, #fffaf1);
      border: 2px solid rgba(230, 180, 70, 0.75);
      color: #8a5a10;
      font-weight: 900;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.7);
    }

    .achievementBadge span {
      display: block;
      margin-top: 2px;
      font-size: 11px;
      font-weight: 700;
      color: #9a7440;
    }

    .achievementEnglish {
      margin: 8px 0 14px;
      color: #9a7440;
      font-size: 13px;
      font-style: italic;
      letter-spacing: 0.04em;
    }

    .achievementButton {
      width: 90%;
      margin-top: 4px;
      padding: 14px 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, #ffd85a, #ffb84d);
      color: #754716;
      font-size: 16px;
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(190, 130, 40, 0.28);
    }

    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes petBreath { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.035); } }

    @keyframes kangarooJump {
      0%, 100% { transform: translateY(0) scaleX(1) scaleY(1); }
      18% { transform: translateY(5px) scaleX(1.06) scaleY(0.94); }
      45% { transform: translateY(-22px) scaleX(0.96) scaleY(1.06); }
      68% { transform: translateY(0) scaleX(1.04) scaleY(0.96); }
    }

    @keyframes rabbitHop {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      30% { transform: translateY(3px) scaleX(1.03) scaleY(0.97); }
      55% { transform: translateY(-11px) rotate(-1deg) scaleX(0.98) scaleY(1.03); }
      75% { transform: translateY(0) rotate(1deg); }
    }

    @keyframes sealGoron {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      22% { transform: translateX(-10px) rotate(-7deg); }
      48% { transform: translateX(0) rotate(0deg); }
      72% { transform: translateX(10px) rotate(7deg); }
    }

    @keyframes catAmae {
      0%, 100% { transform: translateX(0) translateY(0) rotate(0deg) scale(1); }
      25% { transform: translateX(-5px) translateY(2px) rotate(-3deg) scale(1.02); }
      50% { transform: translateX(3px) translateY(0) rotate(2deg) scale(1.035); }
      75% { transform: translateX(-2px) translateY(2px) rotate(-1deg) scale(1.02); }
    }

    @keyframes penguinChokoChoko {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      15% { transform: translateX(-5px) rotate(-4deg); }
      30% { transform: translateX(0) rotate(0deg); }
      45% { transform: translateX(5px) rotate(4deg); }
      60% { transform: translateX(0) rotate(0deg); }
    }

    @keyframes lizardKyoroKyoro {
      0%, 100% { transform: translateX(0) rotate(0deg) scale(1); }

      screen: "start",

      characterId: "",
      mood: "happy",

      hunger: 0,
      cleanliness: 0,
      energy: 0,
      message: "その相棒と自由にお世話を続けましょう。",
      macaronColor: "",
      macaronLabel: "",
      macaronImage: "",
      macaronCharacterId: "",
      macaronStartedAt: 0,
      totalHearts: 0,
      giftsToday: 0,
      careDate: "",
      careStarted: false,
      dayCompleted: false,
      collectedSilhouettes: [],
      silhouetteMasterShown: false
    };

    let wasAllFull = false;
    let macaronTimerId = null;
    const app = document.getElementById("app");

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function getTodayKey() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function resetCareStatsToZero(changeMessage = true) {
      state.affection = 0;
      state.hunger = 0;
      state.cleanliness = 0;
      state.energy = 0;
      state.mood = "happy";
      state.careStarted = false;
      state.dayCompleted = false;

      if (changeMessage) {
        state.message = `${state.petName || "○○"}の新しいお世話を始めましょう。`;
      }
    }

    function normalizeDailyState() {
      const today = getTodayKey();

      if (!state.careDate) {
        state.careDate = today;
      }

      if (state.careDate !== today) {
        state.careDate = today;
        state.giftsToday = 0;
        resetCareStatsToZero(true);
        state.message = `${state.petName || "○○"}の新しい1日が始まりました。0%から少しずつお世話していきましょう。`;
      }
    }

    function load() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        state.careDate = getTodayKey();
        return;
      }

      try {
        const saved = JSON.parse(raw);
        state = { ...state, ...saved };

        if (!Array.isArray(state.collectedSilhouettes)) state.collectedSilhouettes = [];
        if (typeof state.totalHearts !== "number") state.totalHearts = 0;
        if (typeof state.giftsToday !== "number") state.giftsToday = 0;
        if (typeof state.careStarted !== "boolean") state.careStarted = false;
        if (typeof state.dayCompleted !== "boolean") state.dayCompleted = false;
        if (typeof state.careDate !== "string") state.careDate = "";
        if (typeof state.macaronStartedAt !== "number") state.macaronStartedAt = 0;
        if (typeof state.macaronColor !== "string") state.macaronColor = "";
        if (typeof state.macaronLabel !== "string") state.macaronLabel = "";
        if (typeof state.macaronImage !== "string") state.macaronImage = "";
        if (typeof state.macaronCharacterId !== "string") state.macaronCharacterId = "";
        if (typeof state.silhouetteMasterShown !== "boolean") state.silhouetteMasterShown = false;

        normalizeDailyState();
      } catch (e) {
        localStorage.removeItem(STORAGE_KEY);
        state.careDate = getTodayKey();
      }
    }

    function clamp(value) {
      return Math.max(0, Math.min(100, value));
    }

    function getAverageCareStatus() {
      return (
        Number(state.affection || 0) +
        Number(state.hunger || 0) +
        Number(state.cleanliness || 0) +
        Number(state.energy || 0)
      ) / 4;
    }

    function isLowStatusScene() {
      return state.screen === "care" && state.careStarted && !state.dayCompleted && getAverageCareStatus() <= LOW_STATUS_THRESHOLD;
    }

    function isAllFull() {
      return state.affection >= 100 && state.hunger >= 100 && state.cleanliness >= 100 && state.energy >= 100;
    }

    function applySceneClass() {
      document.body.classList.toggle("low-status-mode", isLowStatusScene());
    }

    function getCharacter() {
      return CHARACTERS.find(c => c.id === state.characterId) || CHARACTERS[0];
    }

    function getPetImage() {
      const character = getCharacter();

      if (state.mood === "sleep" || state.dayCompleted) {
        return character.sleep || character.sad || character.happy;
      }

      if (state.mood === "sad" || isLowStatusScene()) {
        return character.sad;
      }

      return character.happy;
    }

    function getMotionClass() {
      if (!state.characterId || state.mood === "sleep" || state.dayCompleted) return "";
      return `motion-${state.characterId}`;
    }

    function getCollectedCount() {
      return state.collectedSilhouettes.length;
    }

    function unlockSilhouette() {
      const collected = new Set(state.collectedSilhouettes);
      const candidates = SILHOUETTES.filter(item => !collected.has(item.id));

      if (candidates.length === 0) return null;

      const item = candidates[Math.floor(Math.random() * candidates.length)];
      state.collectedSilhouettes.push(item.id);
      return item;
    }

    function finishAction(options = {}) {
      if (!state.dayCompleted && options.markCareStarted) {
        state.careStarted = true;
      }

      let newGift = null;
      const becameFull = !state.dayCompleted && isAllFull();

      if (becameFull) {
        state.totalHearts += 1;
        state.mood = "sleep";
        state.dayCompleted = true;
        state.careStarted = false;

        const canReceiveToday = state.giftsToday < MAX_DAILY_SILHOUETTE_GIFTS;
        const hasRemainingSilhouettes = getCollectedCount() < TOTAL_SILHOUETTES;

        if (canReceiveToday && hasRemainingSilhouettes) {
          newGift = unlockSilhouette();
          if (newGift) state.giftsToday += 1;
        }

        if (getCollectedCount() >= TOTAL_SILHOUETTES) {
          state.message = `${state.petName}は全部満足して、お昼寝しています。シルエット図鑑が完成しました。`;
        } else if (state.giftsToday >= MAX_DAILY_SILHOUETTE_GIFTS) {
          state.message = `${state.petName}は全部満足して、お昼寝しています。今日のシルエットプレゼントは4こまでです。`;
        } else {
          state.message = `${state.petName}は全部満足して、お昼寝しています。`;
        }
      }

      const shouldShowMasterCard =
        becameFull &&
        getCollectedCount() >= TOTAL_SILHOUETTES &&
        !state.silhouetteMasterShown;

      save();
      render();

      if (becameFull) {
        setTimeout(showFullReward, 80);
      }

      if (options.hearts) {
        setTimeout(makeHearts, 40);
      }

      if (newGift) {
        setTimeout(() => showSilhouetteGift(newGift, shouldShowMasterCard), 280);
      } else if (shouldShowMasterCard) {
        setTimeout(showSilhouetteMasterCard, 280);
      } else if (becameFull && getCollectedCount() >= TOTAL_SILHOUETTES) {
        setTimeout(showCompleteGift, 280);
      } else if (becameFull && state.giftsToday >= MAX_DAILY_SILHOUETTE_GIFTS) {
        setTimeout(showDailyLimitNotice, 280);
      }

      wasAllFull = isAllFull();
    }

    function startNextCareRound() {
      if (state.giftsToday >= MAX_DAILY_SILHOUETTE_GIFTS) {
        alert("今日のシルエットプレゼントは4こまでです。明日またお世話できます。");
        return;
      }

      resetCareStatsToZero(true);
      state.message = `${state.petName}の次の日のお世話を始めましょう。0%から少しずつ満たしていきます。`;
      save();
      render();
    }

            class="gift-img"

    function showCssGiftFallback() {
      const card = document.querySelector(".card");
      if (!card) return;

      card.innerHTML = `
        <h2>プレゼントが届きました</h2>
        <p>プレゼントをクリックしてみてね。</p>

        <div class="gift" onclick="openGift()">
          <div class="gift-lid"></div>

        </div>

        <p class="small">この自由モードでは、研究用の条件変化はありません。</p>
      `;

    function openGift() {
      const macaron = chooseMacaron();

      state.screen = "macaron";
      state.macaronColor = macaron.color;
      state.macaronLabel = macaron.label;
      state.macaronImage = macaron.image;
      state.macaronCharacterId = macaron.characterId;
      state.macaronStartedAt = Date.now();

      save();
      render();
    }

    function chooseMacaron() {
      return MACARON_OPTIONS[Math.floor(Math.random() * MACARON_OPTIONS.length)];
    }

    function getCurrentMacaron() {
      if (!state.macaronImage || !state.macaronCharacterId) {
        const macaron = chooseMacaron();
        state.macaronColor = macaron.color;
        state.macaronLabel = macaron.label;
        state.macaronImage = macaron.image;
        state.macaronCharacterId = macaron.characterId;
        state.macaronStartedAt = Date.now();
        save();
      }

      return {
        color: state.macaronColor,
        label: state.macaronLabel || "マカロン",
        image: state.macaronImage,
        characterId: state.macaronCharacterId
      };
    }

    function getMacaronRemainingMs() {
      const startedAt = Number(state.macaronStartedAt || 0);
      if (!startedAt) return MACARON_BIRTH_WAIT_MS;

      return Math.max(0, MACARON_BIRTH_WAIT_MS - (Date.now() - startedAt));
    }

    function getMacaronProgressPercent() {
      const remaining = getMacaronRemainingMs();

      return Math.min(
        100,
        Math.max(0, ((MACARON_BIRTH_WAIT_MS - remaining) / MACARON_BIRTH_WAIT_MS) * 100)
      );
    }

    function showMacaron() {
      const macaron = getCurrentMacaron();
      const remainingSeconds = Math.ceil(getMacaronRemainingMs() / 1000);
      const progress = getMacaronProgressPercent();

      app.innerHTML = `
        <div class="card">
          <h2>マカロンが出てきました</h2>
          <p>${escapeHtml(macaron.label)}から、小さな相棒が生まれようとしています。</p>

          <img
            class="macaron-img"
            src="${macaron.image}"
            alt="${escapeHtml(macaron.label)}"
            onerror="showCssMacaronFallback()"
          >

          <div class="macaron-wait-box">
            <div>生まれるまで</div>
            <div class="macaron-countdown" id="macaronCountdown">${remainingSeconds}</div>
            <div>秒くらいです</div>
            <div class="macaron-progress">
              <div class="macaron-progress-fill" id="macaronProgressFill" style="width:${progress}%"></div>
            </div>
            <p class="small">このマカロンの色で、生まれてくる相棒が決まります。</p>
          </div>
        </div>
      `;

      startMacaronTimer();
    }

    function startMacaronTimer() {
      if (macaronTimerId) {
        clearInterval(macaronTimerId);
        macaronTimerId = null;
      }

      function updateCountdown() {
        if (state.screen !== "macaron") {
          clearInterval(macaronTimerId);
          macaronTimerId = null;
          return;
        }

        const remaining = getMacaronRemainingMs();
        const remainingSeconds = Math.ceil(remaining / 1000);
        const countdown = document.getElementById("macaronCountdown");
        const progressFill = document.getElementById("macaronProgressFill");

        if (countdown) countdown.textContent = remainingSeconds;
        if (progressFill) progressFill.style.width = `${getMacaronProgressPercent()}%`;

        if (remaining <= 0) {
          clearInterval(macaronTimerId);
          macaronTimerId = null;
          birthPet();
        }
      }

      updateCountdown();
      macaronTimerId = setInterval(updateCountdown, 500);
    }

    function showCssMacaronFallback() {
      const card = document.querySelector(".card");
      if (!card) return;

      const remainingSeconds = Math.ceil(getMacaronRemainingMs() / 1000);
      const progress = getMacaronProgressPercent();

      card.innerHTML = `
        <h2>マカロンが出てきました</h2>
        <p>マカロンから、小さな相棒が生まれようとしています。</p>

        <div class="macaron">
          <div class="macaron-top"></div>
          <div class="macaron-cream"></div>
          <div class="macaron-bottom"></div>
        </div>

        <div class="macaron-wait-box">
          <div>生まれるまで</div>
          <div class="macaron-countdown" id="macaronCountdown">${remainingSeconds}</div>
          <div>秒くらいです</div>
          <div class="macaron-progress">
            <div class="macaron-progress-fill" id="macaronProgressFill" style="width:${progress}%"></div>
          </div>
        </div>
      `;
    }

    function birthPet() {
      if (macaronTimerId) {
        clearInterval(macaronTimerId);
        macaronTimerId = null;
      }

      const macaron = getCurrentMacaron();

      state.characterId = macaron.characterId || chooseMacaron().characterId;
      state.screen = "name";
      state.mood = "happy";
      state.affection = 0;
      state.hunger = 0;
      state.cleanliness = 0;
      state.energy = 0;
      state.careDate = getTodayKey();
      state.giftsToday = 0;
      state.careStarted = false;
      state.dayCompleted = false;
      state.message = "名前をつけてね。";
      state.macaronStartedAt = 0;

      save();
      render();
    }

    function showNameInput() {
      const img = getPetImage();
      const motionClass = getMotionClass();

      app.innerHTML = `
        <div class="card">
          <h2>名前をつけてね</h2>
          <div class="pet-area">
            <img class="pet-img ${motionClass}" src="${img}" alt="相棒" onerror="showFallbackPet(this)">
          </div>
          <input id="petNameInput" type="text" maxlength="12" placeholder="名前を入力" />
          <br>
          <button onclick="savePetName()">この名前にする</button>
        </div>
      `;
    }

    function savePetName() {
      const input = document.getElementById("petNameInput");
      const name = input.value.trim();

      if (!name) {
        alert("名前を入力してください。");
        return;
      }

      state.petName = name;
      state.screen = "care";
      state.message = `${state.petName}と自由にお世話を続けましょう。0%から少しずつ満たしていきます。`;

      save();
      render();
    }

    function showCare() {
      const img = getPetImage();
      const lowStatus = isLowStatusScene();
      const motionClass = getMotionClass();
      const isSleeping = state.dayCompleted || state.mood === "sleep";
      const canStartNext = state.giftsToday < MAX_DAILY_SILHOUETTE_GIFTS;

      app.innerHTML = `
        <div class="card">
          <h1>${escapeHtml(state.petName)}</h1>

          <div class="pet-area" id="petArea">
            <img class="pet-img ${motionClass}" src="${img}" alt="相棒" ${isSleeping ? "" : 'onclick="petTouch()"'} onerror="showFallbackPet(this)">
            ${lowStatus ? lowStatusTearsHtml() : ""}
          </div>

          <div class="message">${escapeHtml(state.message)}</div>

          ${collectionStatusHtml()}

          <div class="status">
            ${bar("なかよし", state.affection)}
            ${bar("おなか", state.hunger)}
            ${bar("きれい", state.cleanliness)}
            ${bar("げんき", state.energy)}
          </div>

          ${isSleeping ? `
            <div class="sleep-panel">
              <div class="sleep-panel-title">お昼寝中です</div>
              <div>${escapeHtml(state.petName)}は満足して、すやすや眠っています。</div>

              ${canStartNext ? `
                <button onclick="startNextCareRound()">次の日のお世話を始める</button>
                <div class="daily-limit-note">今日のプレゼントはあと${MAX_DAILY_SILHOUETTE_GIFTS - state.giftsToday}こ受け取れます。</div>
              ` : `
                <div class="daily-limit-note">今日のシルエットプレゼントは4こまでです。明日になると、また0%から始められます。</div>
              `}
            </div>
          ` : `
            <div class="actions">
              <button onclick="showFoodChoices()">ごはん</button>
              <button onclick="showWalkChoices()">おでかけ</button>
              <button onclick="petTouch()">なでる</button>
              <button onclick="startCleanGame()">きれいにする</button>
            </div>

            <div class="choice-box" id="choiceBox"></div>
            <div class="mini-game" id="cleanGame"></div>

            <button class="secondary" onclick="smallRest()">様子を見る</button>
          `}

          <button class="danger" onclick="resetGame()">リセット</button>
        </div>

        ${lowStatus ? lowStatusSceneHtml() : ""}
      `;
    }

    function bar(label, value) {
      const safeValue = clamp(value);

      return `
        <div class="bar-row">
          <div class="bar-label">
            <span>${label}</span>
            <span>${safeValue}</span>
          </div>
          <div class="bar">
            <div class="bar-fill" style="width:${safeValue}%"></div>
          </div>
        </div>
      `;
    }

    function showFoodChoices() {
      hideCleanGame();

      const box = document.getElementById("choiceBox");
      box.style.display = "block";
      box.innerHTML = `
        <h2>ごはんを選んでね</h2>
        <button onclick="giveFood('macaron')">小さなマカロン</button>
        <button onclick="giveFood('milk')">ふわふわミルク</button>
      `;
    }

    function giveFood(type) {
      if (type === "macaron") {
        state.hunger = clamp(state.hunger + 20);
        state.affection = clamp(state.affection + 8);
        state.energy = clamp(state.energy + 5);
        state.mood = "happy";
        state.message = `${state.petName}は小さなマカロンをうれしそうに食べています。`;
      } else {
        state.hunger = clamp(state.hunger + 15);
        state.affection = clamp(state.affection + 10);
        state.energy = clamp(state.energy + 8);
        state.mood = "happy";
        state.message = `${state.petName}はふわふわミルクでほっとしています。`;
      }

      finishAction({ markCareStarted: true });
    }

    function showWalkChoices() {
      hideCleanGame();

      const box = document.getElementById("choiceBox");
      box.style.display = "block";
      box.innerHTML = `
        <h2>どこへ行く？</h2>
        <button onclick="goWalk('park')">雲の公園</button>
        <button onclick="goWalk('star')">星の丘</button>
      `;
    }

    function goWalk(place) {
      if (place === "park") {
        state.energy = clamp(state.energy - 10);
        state.affection = clamp(state.affection + 12);
        state.cleanliness = clamp(state.cleanliness - 8);
        state.mood = "happy";
        state.message = `${state.petName}は雲の公園で楽しそうに遊びました。`;
      } else {
        state.energy = clamp(state.energy - 12);
        state.affection = clamp(state.affection + 14);
        state.cleanliness = clamp(state.cleanliness - 6);
        state.mood = "happy";
        state.message = `${state.petName}は星の丘で空を見上げています。`;
      }

      finishAction({ markCareStarted: true });
    }

    function petTouch() {
      state.affection = clamp(state.affection + 8);
      state.energy = clamp(state.energy + 2);
      state.mood = "happy";
      state.message = `${state.petName}はうれしそうです。`;

      finishAction({ hearts: true, markCareStarted: true });
    }

    function makeHearts() {
      const area = document.getElementById("petArea");
      if (!area) return;

      for (let i = 0; i < 12; i++) {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.textContent = ["💙", "💜", "💗", "✨"][Math.floor(Math.random() * 4)];
        heart.style.left = `${80 + Math.random() * 180}px`;
        heart.style.top = `${95 + Math.random() * 70}px`;
        heart.style.animationDelay = `${Math.random() * 0.25}s`;

        area.appendChild(heart);
        setTimeout(() => heart.remove(), 1600);
      }
    }

    function startCleanGame() {
      const choiceBox = document.getElementById("choiceBox");

      if (choiceBox) {
        choiceBox.style.display = "none";
        choiceBox.innerHTML = "";
      }

      const game = document.getElementById("cleanGame");
      game.style.display = "block";
      game.innerHTML = `
        <h2>きれいにしよう</h2>
        <p>うんちをクリックして片づけてね。</p>
        <div class="poop-field" id="poopField"></div>
      `;

      const field = document.getElementById("poopField");

      const positions = [
        { left: 26, top: 28 },
        { left: 115, top: 58 },
        { left: 245, top: 30 },
        { left: 70, top: 112 },
        { left: 295, top: 105 }
      ];

      positions.forEach((pos) => {
        const poop = document.createElement("div");
        poop.className = "poop";
        poop.textContent = "💩";
        poop.style.left = `${pos.left}px`;
        poop.style.top = `${pos.top}px`;
        poop.dataset.cleaned = "false";
        poop.onclick = () => cleanPoop(poop);
        field.appendChild(poop);
      });
    }

    function cleanPoop(poop) {
      poop.classList.add("cleaned");
      poop.dataset.cleaned = "true";

      const allPoops = Array.from(document.querySelectorAll(".poop"));
      const allCleaned = allPoops.every(p => p.dataset.cleaned === "true");

      if (allCleaned) {
        state.cleanliness = clamp(state.cleanliness + 25);
        state.affection = clamp(state.affection + 6);
        state.mood = "happy";
        state.message = `${state.petName}のまわりがきれいになりました。`;

        setTimeout(() => finishAction({ markCareStarted: true }), 450);
      }
    }

    function hideCleanGame() {
      const game = document.getElementById("cleanGame");

      if (game) {
        game.style.display = "none";
        game.innerHTML = "";
      }
    }

    function smallRest() {
      state.energy = clamp(state.energy + 8);
      state.hunger = clamp(state.hunger - 3);

      if (state.hunger < 25 || state.cleanliness < 25) {
        state.mood = "sad";
        state.message = `${state.petName}は少し気にしているみたいです。お世話してあげるとよさそうです。`;
      } else {
        state.mood = "happy";
        state.message = `${state.petName}はそばでのんびりしています。`;
      }

      finishAction({ markCareStarted: true });
    }

    function resetGame() {
      const ok = confirm("自由なお世話モードを最初からやり直しますか？\n集めたシルエット図鑑もリセットされます。");

      if (!ok) return;

      localStorage.removeItem(STORAGE_KEY);

      state = {
        screen: "start",
        petName: "",
        characterId: "",
        mood: "happy",
        affection: 0,
        hunger: 0,
        cleanliness: 0,
        energy: 0,
        message: "その相棒と自由にお世話を続けましょう。",
        macaronColor: "",
        macaronLabel: "",
        macaronImage: "",
        macaronCharacterId: "",
        macaronStartedAt: 0,
        totalHearts: 0,
        giftsToday: 0,
        careDate: getTodayKey(),
        careStarted: false,
        dayCompleted: false,
        collectedSilhouettes: [],
        silhouetteMasterShown: false
      };

      wasAllFull = false;
      render();
    }

    function showFallbackPet(img) {
      img.outerHTML = `
        <div class="fallback-pet" onclick="petTouch()">
          <div class="fallback-face">´ ᴗ \`</div>
        </div>
      `;
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function render() {
      if (state.screen === "start") {
        showStart();
      } else if (state.screen === "gift") {
        showGift();
      } else if (state.screen === "macaron") {
        showMacaron();
      } else if (state.screen === "name") {
        showNameInput();
      } else if (state.screen === "care") {
        showCare();
      } else {
        state.screen = "start";
        save();
        showStart();
      }

      applySceneClass();
    }

    load();
    wasAllFull = isAllFull();
    render();
  </script>
</body>
</html>
