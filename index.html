<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>マカロン星のお世話ゲーム 通常版</title>
  <style>
    :root{
      --bg1:#eef8ff;
      --bg2:#fff3fb;
      --card:#ffffffcc;
      --ink:#26324a;
      --sub:#65708a;
      --main:#62b7ff;
      --accent:#ff9fd2;
      --good:#7ee2a8;
      --warn:#ffd36a;
      --bad:#ff8c8c;
      --shadow:0 18px 45px rgba(70,90,130,.18);
      --radius:28px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at 15% 12%, rgba(255,255,255,.92) 0 9%, transparent 10%),
        radial-gradient(circle at 85% 16%, rgba(255,255,255,.82) 0 7%, transparent 8%),
        linear-gradient(135deg,var(--bg1),var(--bg2));
      overflow-x:hidden;
    }
    .wrap{
      width:min(460px, 100%);
      min-height:100vh;
      margin:0 auto;
      padding:18px 16px 28px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .app{
      width:100%;
      background:var(--card);
      backdrop-filter: blur(10px);
      border:1px solid rgba(255,255,255,.72);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:20px;
      position:relative;
      overflow:hidden;
    }
    .app:before{
      content:"";
      position:absolute;
      width:220px;
      height:220px;
      right:-90px;
      top:-100px;
      border-radius:50%;
      background:linear-gradient(135deg, rgba(98,183,255,.35), rgba(255,159,210,.35));
      pointer-events:none;
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      position:relative;
      z-index:1;
    }
    .brand{
      font-weight:800;
      letter-spacing:.02em;
      font-size:15px;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      border-radius:999px;
      padding:7px 10px;
      background:#fff;
      color:var(--sub);
      font-size:12px;
      box-shadow:0 8px 20px rgba(70,90,130,.08);
      white-space:nowrap;
    }
    h1{
      margin:20px 0 8px;
      font-size:25px;
      line-height:1.35;
      position:relative;
      z-index:1;
    }
    p{
      margin:8px 0;
      color:var(--sub);
      line-height:1.75;
      font-size:14px;
      position:relative;
      z-index:1;
    }
    .center{text-align:center}
    .stage{
      min-height:310px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:12px;
      position:relative;
      z-index:1;
    }
    .character{
      width:min(285px, 82vw);
      height:260px;
      object-fit:contain;
      filter:drop-shadow(0 18px 18px rgba(60,80,120,.16));
      animation:float 3.4s ease-in-out infinite;
      user-select:none;
      -webkit-user-drag:none;
    }
    .macaron{
      width:min(230px, 72vw);
      height:210px;
      object-fit:contain;
      filter:drop-shadow(0 18px 18px rgba(60,80,120,.14));
      animation:pulse 2.2s ease-in-out infinite;
      cursor:pointer;
      user-select:none;
      -webkit-user-drag:none;
    }
    .gift{
      width:190px;
      height:170px;
      display:grid;
      place-items:center;
      cursor:pointer;
      border-radius:36px;
      background:
        linear-gradient(90deg, transparent 42%, rgba(255,255,255,.75) 43% 57%, transparent 58%),
        linear-gradient(0deg, transparent 43%, rgba(255,255,255,.75) 44% 56%, transparent 57%),
        linear-gradient(135deg,#72c7ff,#ff9fd2);
      box-shadow:0 22px 35px rgba(80,100,150,.18);
      position:relative;
      animation:float 3.1s ease-in-out infinite;
    }
    .gift:before,.gift:after{
      content:"";
      position:absolute;
      top:-34px;
      width:74px;
      height:62px;
      border:14px solid rgba(255,255,255,.78);
      border-radius:50% 50% 12px 50%;
      background:transparent;
    }
    .gift:before{left:35px; transform:rotate(-25deg)}
    .gift:after{right:35px; transform:rotate(115deg)}
    .gift span{font-size:42px; z-index:1}
    .sparkles{
      font-size:20px;
      letter-spacing:10px;
      color:#6bbdff;
      animation:twinkle 1.3s ease-in-out infinite alternate;
    }
    .bubble{
      width:100%;
      margin:10px 0 0;
      padding:14px 15px;
      border-radius:22px;
      background:#fff;
      color:#45506a;
      box-shadow:0 12px 26px rgba(70,90,130,.10);
      line-height:1.7;
      font-size:14px;
      position:relative;
      z-index:1;
    }
    .bubble:before{
      content:"";
      position:absolute;
      left:50%;
      top:-9px;
      width:18px;
      height:18px;
      background:#fff;
      transform:translateX(-50%) rotate(45deg);
      border-radius:3px;
    }
    .buttons{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:14px;
      position:relative;
      z-index:1;
    }
    button{
      appearance:none;
      border:0;
      border-radius:999px;
      padding:13px 14px;
      font-weight:800;
      color:#fff;
      background:linear-gradient(135deg,var(--main),#7f8cff);
      box-shadow:0 12px 22px rgba(98,183,255,.26);
      cursor:pointer;
      transition:transform .12s ease, filter .12s ease;
      font-size:14px;
    }
    button:hover{transform:translateY(-1px); filter:brightness(1.02)}
    button:active{transform:translateY(1px) scale(.99)}
    button.secondary{
      color:#45506a;
      background:#fff;
      box-shadow:0 10px 18px rgba(70,90,130,.10);
    }
    button.pink{
      background:linear-gradient(135deg,#ff9fd2,#ffb26f);
      box-shadow:0 12px 22px rgba(255,159,210,.24);
    }
    button.green{
      background:linear-gradient(135deg,#76d99c,#43c6ac);
      box-shadow:0 12px 22px rgba(67,198,172,.22);
    }
    button.full{grid-column:1/-1}
    .stats{
      display:grid;
      gap:9px;
      margin-top:12px;
      position:relative;
      z-index:1;
    }
    .stat{
      display:grid;
      grid-template-columns:74px 1fr 42px;
      align-items:center;
      gap:8px;
      font-size:12px;
      color:#505b73;
    }
    .bar{
      height:11px;
      background:rgba(100,120,150,.12);
      border-radius:999px;
      overflow:hidden;
    }
    .bar i{
      display:block;
      height:100%;
      width:50%;
      border-radius:999px;
      background:linear-gradient(90deg,var(--good),var(--main));
      transition:width .25s ease;
    }
    .nameRow{
      display:flex;
      gap:10px;
      margin-top:14px;
      position:relative;
      z-index:1;
    }
    input{
      width:100%;
      border:1px solid rgba(100,120,150,.18);
      border-radius:999px;
      padding:13px 15px;
      font-size:15px;
      outline:none;
      background:#fff;
      color:var(--ink);
    }
    input:focus{border-color:rgba(98,183,255,.72); box-shadow:0 0 0 4px rgba(98,183,255,.12)}
    .footerNote{
      margin-top:14px;
      text-align:center;
      color:#8790a6;
      font-size:11px;
      line-height:1.6;
      position:relative;
      z-index:1;
    }
    .smallLink{
      margin-top:8px;
      padding:9px 12px;
      font-size:12px;
      color:#6b7286;
      background:transparent;
      box-shadow:none;
      text-decoration:underline;
    }

    .choicePanel{
      display:grid;
      gap:12px;
      width:100%;
      position:relative;
      z-index:1;
    }
    .choiceCard{
      border:0;
      border-radius:24px;
      padding:16px 14px;
      background:#fff;
      color:#44506a;
      box-shadow:0 12px 26px rgba(70,90,130,.10);
      text-align:left;
      font-weight:800;
      line-height:1.6;
    }
    .choiceCard small{
      display:block;
      margin-top:4px;
      color:#7b849a;
      font-weight:600;
      font-size:12px;
    }
    .playStage{
      min-height:330px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:12px;
      position:relative;
      z-index:1;
      overflow:hidden;
      border-radius:26px;
    }
    .petTarget{
      cursor:pointer;
      touch-action:manipulation;
    }
    .heartPop{
      position:absolute;
      font-size:28px;
      pointer-events:none;
      animation:heartUp .85s ease-out forwards;
      z-index:5;
    }
    @keyframes heartUp{
      0%{opacity:0; transform:translate(-50%,-50%) scale(.5)}
      20%{opacity:1}
      100%{opacity:0; transform:translate(-50%,-150%) scale(1.35)}
    }
    .cleanBoard{
      width:100%;
      height:260px;
      position:relative;
      border-radius:28px;
      background:linear-gradient(180deg, rgba(255,255,255,.68), rgba(255,255,255,.35));
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.55);
      overflow:hidden;
    }
    .cleanCharacter{
      position:absolute;
      left:50%;
      top:54%;
      transform:translate(-50%,-50%);
      width:min(230px, 70vw);
      height:220px;
      object-fit:contain;
      filter:drop-shadow(0 16px 16px rgba(60,80,120,.12));
      pointer-events:none;
      user-select:none;
      -webkit-user-drag:none;
    }
    .poopItem{
      position:absolute;
      width:48px;
      height:48px;
      border:0;
      border-radius:50%;
      background:#fff;
      box-shadow:0 10px 20px rgba(70,90,130,.14);
      display:grid;
      place-items:center;
      font-size:24px;
      padding:0;
      cursor:pointer;
      z-index:3;
      animation:poopWiggle 1.5s ease-in-out infinite;
    }
    @keyframes poopWiggle{
      0%,100%{transform:rotate(0deg)}
      50%{transform:rotate(6deg)}
    }

    .hidden{display:none !important}
    @keyframes float{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-8px)}
    }
    @keyframes pulse{
      0%,100%{transform:scale(1)}
      50%{transform:scale(1.035)}
    }
    @keyframes twinkle{
      from{opacity:.45; transform:translateY(0)}
      to{opacity:1; transform:translateY(-4px)}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <main class="app" id="app"></main>
  </div>

  <script>
    const STORAGE_KEY = "macaron_normal_game_v1";

    const CHARACTER_LIST = [
      {
        id: "cat_purple",
        displayName: "むらさき猫",
        type: "猫",
        happy: "public/assets/characters/cat_purple/happy.png",
        sad: "public/assets/characters/cat_purple/sad.png",
        sleep: "public/assets/characters/cat_purple/sleep.png"
      },
      {
        id: "kangaroo_blue",
        displayName: "ブルーカンガルー",
        type: "カンガルー",
        happy: "public/assets/characters/kangaroo_blue/happy.png",
        sad: "public/assets/characters/kangaroo_blue/sad.png",
        sleep: "public/assets/characters/kangaroo_blue/sleep.png"
      },
      {
        id: "lizard_green",
        displayName: "グリーントカゲ",
        type: "トカゲ",
        happy: "public/assets/characters/lizard_green/happy.png",
        sad: "public/assets/characters/lizard_green/sad.png",
        sleep: "public/assets/characters/lizard_green/sleep.png"
      },
      {
        id: "penguin_yellow",
        displayName: "イエローペンギン",
        type: "ペンギン",
        happy: "public/assets/characters/penguin_yellow/happy.png",
        sad: "public/assets/characters/penguin_yellow/sad.png",
        sleep: "public/assets/characters/penguin_yellow/sleep.png"
      },
      {
        id: "rabbit_pink",
        displayName: "ピンクうさぎ",
        type: "うさぎ",
        happy: "public/assets/characters/rabbit_pink/happy.png",
        sad: "public/assets/characters/rabbit_pink/sad.png",
        sleep: "public/assets/characters/rabbit_pink/sleep.png"
      },
      {
        id: "seal_gray",
        displayName: "グレーアザラシ",
        type: "アザラシ",
        happy: "public/assets/characters/seal_gray/happy.png",
        sad: "public/assets/characters/seal_gray/sad.png",
        sleep: "public/assets/characters/seal_gray/sleep.png"
      }
    ];

    const MACARON_IMAGES = [
      "public/assets/macarons/blue_macaron.png",
      "public/assets/macarons/blue_crystal_macaron.png"
    ];

    const FALLBACK = {
      happy: "happy.png",
      sad: "sad.png",
      sleep: "sleep.png",
      macaron: "blue_macaron.png"
    };

    const app = document.getElementById("app");

    let state = loadState() || createInitialState();
    applyTimeDecay();
    saveState();
    render();

    function createInitialState(){
      return {
        phase: "gift",
        createdAt: Date.now(),
        bornAt: null,
        lastSavedAt: Date.now(),
        characterId: null,
        partnerName: "",
        macaronImage: pick(MACARON_IMAGES),
        stats: {
          hunger: 70,
          affection: 60,
          energy: 70,
          clean: 70
        },
        actionsToday: 0,
        lastActionDate: todayKey(),
        message: "アンケートへのご協力ありがとうございました。ここからは、研究条件のない自由なお世話ゲームです。"
      };
    }

    function loadState(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      }catch(e){
        return null;
      }
    }

    function saveState(){
      state.lastSavedAt = Date.now();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function resetGame(){
      const ok = confirm("最初からやり直しますか？今の相棒とお世話の記録は、この端末から消えます。");
      if(!ok) return;
      localStorage.removeItem(STORAGE_KEY);
      state = createInitialState();
      saveState();
      render();
    }

    function startMacaron(){
      state.phase = "macaron";
      state.message = "マカロン星から、ふしぎなマカロンが届きました。タップすると、中から相棒が生まれます。";
      saveState();
      render();
    }

    function hatch(){
      state.phase = "hatching";
      state.message = "マカロンがふわっと光っています。もうすぐ相棒が出てきそうです。";
      saveState();
      render();
      setTimeout(() => {
        const character = pick(CHARACTER_LIST);
        state.characterId = character.id;
        state.phase = "name";
        state.bornAt = Date.now();
        state.createdAt = Date.now();
        state.stats = { hunger: 72, affection: 64, energy: 76, clean: 74 };
        state.message = `名前をつけてください。`;
        saveState();
        render();
      }, 1800);
    }

    function setName(){
      const input = document.getElementById("partnerName");
      const value = (input.value || "").trim();
      state.partnerName = value || "相棒";
      state.phase = "game";
      state.message = `${state.partnerName}は、あなたを見上げています。今日から、ゆっくりお世話を続けられます。`;
      saveState();
      render();
    }

    function doAction(action){
      rollDayIfNeeded();
      const s = state.stats;
      const name = state.partnerName || "相棒";

      if(action === "feed"){
        s.hunger += 24;
        s.affection += 5;
        s.energy -= 2;
        state.message = pick([
          `${name}はもぐもぐ食べています。おいしかったみたいです。`,
          `${name}の宝石がきらっと光りました。ごはんで少し元気になりました。`,
          `ごはんを食べた${name}は、満足そうにこちらを見ています。`
        ]);
      }
      if(action === "pet"){
        s.affection += 18;
        s.energy += 4;
        state.message = pick([
          `${name}はうれしそうに目を細めました。`,
          `なでられて、${name}は少し安心したようです。`,
          `${name}がそっと近づいてきました。もっと一緒にいたいのかもしれません。`
        ]);
      }
      if(action === "walk"){
        s.affection += 12;
        s.energy -= 16;
        s.hunger -= 10;
        s.clean -= 8;
        state.message = pick([
          `${name}と小さなおでかけをしました。少し疲れたけれど楽しそうです。`,
          `マカロン星の道を少し歩きました。${name}は新しいものを見つけたようです。`,
          `${name}は外の空気を吸って、気分が変わったみたいです。`
        ]);
      }
      if(action === "clean"){
        s.clean += 25;
        s.affection += 4;
        state.message = pick([
          `${name}はすっきりした顔をしています。`,
          `からだがきれいになって、${name}の宝石も少し明るく見えます。`,
          `${name}は照れたように、でもうれしそうにしています。`
        ]);
      }
      if(action === "watch"){
        s.affection += 2;
        state.message = pick([
          `${name}は今、${moodText()}です。そばにいるだけでも少し安心するようです。`,
          `${name}はあなたの様子を見ています。今日はどんなふうに過ごしましょうか。`,
          `しばらく見守っていると、${name}は小さく息をついたように見えました。`
        ]);
      }
      if(action === "sleep"){
        s.energy += 30;
        s.hunger -= 5;
        state.message = `${name}は少し休みました。起きたら、また遊べそうです。`;
      }

      clampStats();
      state.actionsToday += 1;
      saveState();
      render();
    }

    function applyTimeDecay(){
      if(!state || state.phase !== "game") return;
      const now = Date.now();
      const last = state.lastSavedAt || now;
      const hours = Math.max(0, (now - last) / 3600000);
      if(hours < 0.05) return;
      state.stats.hunger -= hours * 3.2;
      state.stats.clean -= hours * 1.6;
      state.stats.affection -= hours * 0.7;
      state.stats.energy += hours * 1.3;
      clampStats();
      rollDayIfNeeded();
    }

    function rollDayIfNeeded(){
      const key = todayKey();
      if(state.lastActionDate !== key){
        state.lastActionDate = key;
        state.actionsToday = 0;
      }
    }

    function clampStats(){
      for(const key of Object.keys(state.stats)){
        state.stats[key] = Math.max(0, Math.min(100, Math.round(state.stats[key])));
      }
    }

    function getCharacter(){
      return CHARACTER_LIST.find(c => c.id === state.characterId) || CHARACTER_LIST[0];
    }

    function getDayNumber(){
      const base = state.bornAt || state.createdAt || Date.now();
      const oneDay = 24 * 60 * 60 * 1000;
      return Math.max(1, Math.floor((startOfLocalDay(Date.now()) - startOfLocalDay(base)) / oneDay) + 1);
    }

    function currentMood(){
      const s = state.stats;
      const hour = new Date().getHours();
      if(s.energy <= 24 || hour >= 23 || hour < 6) return "sleep";
      if(s.hunger <= 30 || s.clean <= 30 || s.affection <= 25) return "sad";
      return "happy";
    }

    function moodText(){
      const mood = currentMood();
      if(mood === "sleep") return "眠たそう";
      if(mood === "sad") return "少しさみしそう";
      return "ごきげん";
    }

    function characterImage(){
      const c = getCharacter();
      return c[currentMood()] || c.happy;
    }

    function render(){
      if(state.phase === "gift") return renderGift();
      if(state.phase === "macaron") return renderMacaron();
      if(state.phase === "hatching") return renderHatching();
      if(state.phase === "name") return renderName();
      if(state.phase === "foodChoice") return renderFoodChoice();
      if(state.phase === "walkChoice") return renderWalkChoice();
      if(state.phase === "petGame") return renderPetGame();
      if(state.phase === "cleanGame") return renderCleanGame();
      return renderGame();
    }

    function renderHeader(extra = "通常版"){
      return `
        <div class="topbar">
          <div class="brand">マカロン星のお世話ゲーム</div>
          <div class="pill">${escapeHtml(extra)}</div>
        </div>
      `;
    }

    function renderGift(){
      app.innerHTML = `
        ${renderHeader("自由プレイ")}
        <h1>ゲームを続けます</h1>
        <p>ここからは、普通のお世話ゲームです。この相棒と、自由にお世話を続けましょう。</p>
        <section class="stage">
          <div class="sparkles">✦ ✧ ✦</div>
          <div class="gift" onclick="startMacaron()" role="button" aria-label="プレゼントを開く"><span>🎁</span></div>
          <div class="bubble">${escapeHtml(state.message)}</div>
        </section>
        <div class="buttons">
          <button class="full" onclick="startMacaron()">プレゼントを開く</button>
        </div>
        <div class="footerNote">この通常版は研究ログを送信しません。この端末のブラウザ内にだけ保存されます。</div>
      `;
    }

    function renderMacaron(){
      app.innerHTML = `
        ${renderHeader("マカロン")}
        <h1>ふしぎなマカロン</h1>
        <p>マカロンをタップすると、中から相棒が生まれます。</p>
        <section class="stage">
          <div class="sparkles">✦ ✧ ✦</div>
          <img class="macaron" src="${state.macaronImage}" onerror="this.onerror=null;this.src='${FALLBACK.macaron}'" onclick="hatch()" alt="ふしぎなマカロン">
          <div class="bubble">${escapeHtml(state.message)}</div>
        </section>
        <div class="buttons">
          <button class="full" onclick="hatch()">マカロンをタップする</button>
          <button class="secondary full" onclick="resetGame()">最初からやり直す</button>
        </div>
      `;
    }

    function renderHatching(){
      app.innerHTML = `
        ${renderHeader("誕生中")}
        <h1>もうすぐ生まれます</h1>
        <p>マカロンがやさしく光っています。</p>
        <section class="stage">
          <div class="sparkles">✦ ✧ ✦</div>
          <img class="macaron" src="${state.macaronImage}" onerror="this.onerror=null;this.src='${FALLBACK.macaron}'" alt="光るマカロン">
          <div class="bubble">${escapeHtml(state.message)}</div>
        </section>
      `;
    }

    function renderName(){
      const c = getCharacter();
      app.innerHTML = `
        ${renderHeader("名前をつける")}
        <h1>かわいいキャラが生まれました</h1>
        <p>この相棒に、名前をつけてください。</p>
        <section class="stage">
          <img class="character" src="${c.happy}" onerror="this.onerror=null;this.src='${FALLBACK.happy}'" alt="生まれた相棒">
        </section>
        <div class="nameRow">
          <input id="partnerName" maxlength="12" placeholder="例：まかろん" autocomplete="off">
          <button onclick="setName()">決定</button>
        </div>
        <div class="buttons">
          <button class="secondary full" onclick="resetGame()">最初からやり直す</button>
        </div>
      `;
      setTimeout(() => {
        const input = document.getElementById("partnerName");
        if(input){
          input.focus();
          input.addEventListener("keydown", e => {
            if(e.key === "Enter") setName();
          });
        }
      }, 50);
    }

    function renderGame(){
      const c = getCharacter();
      const mood = currentMood();
      const day = getDayNumber();
      const name = state.partnerName || "相棒";
      app.innerHTML = `
        ${renderHeader(`${day}日目・${moodText()}`)}
        <h1>${escapeHtml(name)}とのお世話</h1>
        <p>この相棒と、自由にお世話を続けましょう。</p>
        <section class="stage">
          <img class="character" src="${characterImage()}" onerror="this.onerror=null;this.src='${FALLBACK[mood]}'" alt="${escapeHtml(name)}">
          <div class="bubble">${escapeHtml(state.message)}</div>
        </section>
        <div class="stats">
          ${statRow("おなか", state.stats.hunger)}
          ${statRow("なかよし", state.stats.affection)}
          ${statRow("げんき", state.stats.energy)}
          ${statRow("きれい", state.stats.clean)}
        </div>
        <div class="buttons">
          <button onclick="startFoodChoice()">ごはん</button>
          <button class="pink" onclick="startPetGame()">なでる</button>
          <button onclick="startWalkChoice()">おでかけ</button>
          <button class="green" onclick="startCleanGame()">きれいにする</button>
          <button class="secondary" onclick="doAction('watch')">様子を見る</button>
          <button class="secondary" onclick="doAction('sleep')">おやすみ</button>
          <button class="secondary full" onclick="resetGame()">リセットして最初から</button>
        </div>
        <div class="footerNote">リセットすると、最初からやり直せます。</div>
      `;
    }


    function startFoodChoice(){
      rollDayIfNeeded();
      state.phase = "foodChoice";
      state.message = "どちらのごはんにしますか。";
      saveState();
      render();
    }

    function chooseFood(kind){
      const s = state.stats;
      const name = state.partnerName || "相棒";

      if(kind === "sweet"){
        s.hunger += 26;
        s.affection += 7;
        s.energy += 2;
        state.message = `${name}は、あまいマカロンをうれしそうに食べました。`;
      }else{
        s.hunger += 22;
        s.clean += 3;
        s.energy += 5;
        state.message = `${name}は、きらきらゼリーをゆっくり食べました。`;
      }

      finishMiniAction();
    }

    function startWalkChoice(){
      rollDayIfNeeded();
      state.phase = "walkChoice";
      state.message = "どこへおでかけしますか。";
      saveState();
      render();
    }

    function chooseWalk(place){
      const s = state.stats;
      const name = state.partnerName || "相棒";

      if(place === "hill"){
        s.affection += 14;
        s.energy -= 12;
        s.hunger -= 8;
        s.clean -= 5;
        state.message = `${name}と星の丘までおでかけしました。風が気持ちよかったみたいです。`;
      }else{
        s.affection += 10;
        s.energy -= 8;
        s.hunger -= 5;
        s.clean -= 4;
        state.message = `${name}と雲の道をゆっくり歩きました。ふわふわして楽しそうです。`;
      }

      finishMiniAction();
    }

    function startPetGame(){
      rollDayIfNeeded();
      state.phase = "petGame";
      state.petCount = 0;
      state.message = "相棒をタップして、やさしくなでてください。";
      saveState();
      render();
    }

    function petTouch(event){
      if(state.phase !== "petGame") return;

      state.petCount = (state.petCount || 0) + 1;
      makeHeart(event);

      const countText = document.getElementById("petCountText");
      if(countText){
        countText.textContent = `あと ${Math.max(0, 5 - state.petCount)} 回なでてください。`;
      }

      if(state.petCount >= 5){
        const s = state.stats;
        const name = state.partnerName || "相棒";
        s.affection += 20;
        s.energy += 4;
        state.message = `${name}はうれしそうです。ハートがたくさん出ました。`;
        state.phase = "game";
        clampStats();
        state.actionsToday += 1;
        saveState();
        setTimeout(render, 420);
      }else{
        saveState();
      }
    }

    function makeHeart(event){
      const stage = document.getElementById("petStage");
      if(!stage) return;

      const rect = stage.getBoundingClientRect();
      const x = event.clientX ? event.clientX - rect.left : rect.width / 2;
      const y = event.clientY ? event.clientY - rect.top : rect.height / 2;

      const heart = document.createElement("div");
      heart.className = "heartPop";
      heart.textContent = pick(["💗","💖","💕","💓"]);
      heart.style.left = `${x}px`;
      heart.style.top = `${y}px`;
      stage.appendChild(heart);
      setTimeout(() => heart.remove(), 900);
    }

    function startCleanGame(){
      rollDayIfNeeded();
      state.phase = "cleanGame";
      state.cleanLeftIds = [0, 1, 2, 3, 4];
      state.message = "うんちをタップして、きれいにしましょう。";
      saveState();
      render();
    }

    function removeCleanItem(id){
      if(state.phase !== "cleanGame") return;

      state.cleanLeftIds = (state.cleanLeftIds || []).filter(item => item !== id);

      if(state.cleanLeftIds.length === 0){
        const s = state.stats;
        const name = state.partnerName || "相棒";
        s.clean += 30;
        s.affection += 5;
        state.message = `${name}のまわりがきれいになりました。すっきりしたみたいです。`;
        state.phase = "game";
        clampStats();
        state.actionsToday += 1;
        saveState();
        render();
      }else{
        state.message = "あと少しです。残りもタップしてきれいにしましょう。";
        saveState();
        render();
      }
    }

    function finishMiniAction(){
      clampStats();
      state.actionsToday += 1;
      state.phase = "game";
      saveState();
      render();
    }

    function renderFoodChoice(){
      const name = state.partnerName || "相棒";
      app.innerHTML = `
        ${renderHeader("ごはん")}
        <h1>ごはんを選びましょう</h1>
        <p>${escapeHtml(name)}にあげるごはんを、どちらか選んでください。</p>
        <section class="stage">
          <img class="character" src="${characterImage()}" onerror="this.onerror=null;this.src='${FALLBACK[currentMood()]}'" alt="${escapeHtml(name)}">
          <div class="choicePanel">
            <button class="choiceCard" onclick="chooseFood('sweet')">あまいマカロン<small>おなかとなかよしが上がります。</small></button>
            <button class="choiceCard" onclick="chooseFood('jelly')">きらきらゼリー<small>おなかとげんきが上がります。</small></button>
          </div>
        </section>
        <div class="buttons">
          <button class="secondary full" onclick="state.phase='game'; saveState(); render();">戻る</button>
        </div>
      `;
    }

    function renderWalkChoice(){
      const name = state.partnerName || "相棒";
      app.innerHTML = `
        ${renderHeader("おでかけ")}
        <h1>行き先を選びましょう</h1>
        <p>${escapeHtml(name)}と、どこへ行きますか。</p>
        <section class="stage">
          <img class="character" src="${characterImage()}" onerror="this.onerror=null;this.src='${FALLBACK[currentMood()]}'" alt="${escapeHtml(name)}">
          <div class="choicePanel">
            <button class="choiceCard" onclick="chooseWalk('hill')">星の丘へ行く<small>少し疲れるけれど、なかよしが上がります。</small></button>
            <button class="choiceCard" onclick="chooseWalk('cloud')">雲の道を歩く<small>ゆっくりおでかけできます。</small></button>
          </div>
        </section>
        <div class="buttons">
          <button class="secondary full" onclick="state.phase='game'; saveState(); render();">戻る</button>
        </div>
      `;
    }

    function renderPetGame(){
      const name = state.partnerName || "相棒";
      app.innerHTML = `
        ${renderHeader("なでる")}
        <h1>やさしくなでましょう</h1>
        <p>${escapeHtml(name)}をタップすると、ハートが出ます。</p>
        <section class="playStage" id="petStage">
          <img class="character petTarget" src="${characterImage()}" onerror="this.onerror=null;this.src='${FALLBACK[currentMood()]}'" onclick="petTouch(event)" alt="${escapeHtml(name)}">
          <div class="bubble" id="petCountText">あと ${Math.max(0, 5 - (state.petCount || 0))} 回なでてください。</div>
        </section>
        <div class="buttons">
          <button class="secondary full" onclick="state.phase='game'; saveState(); render();">戻る</button>
        </div>
      `;
    }

    function renderCleanGame(){
      const name = state.partnerName || "相棒";
      const positions = [
        {left: 12, top: 72},
        {left: 25, top: 22},
        {left: 68, top: 26},
        {left: 78, top: 70},
        {left: 47, top: 78}
      ];
      const leftIds = Array.isArray(state.cleanLeftIds) ? state.cleanLeftIds : [0, 1, 2, 3, 4];
      state.cleanLeftIds = leftIds;

      app.innerHTML = `
        ${renderHeader("きれいにする")}
        <h1>きれいにしましょう</h1>
        <p>うんちをタップして、相棒のまわりをきれいにしてください。</p>
        <section class="stage">
          <div class="cleanBoard">
            <img class="cleanCharacter" src="${characterImage()}" onerror="this.onerror=null;this.src='${FALLBACK[currentMood()]}'" alt="${escapeHtml(name)}">
            ${leftIds.map(id => `
              <button class="poopItem" style="left:${positions[id].left}%; top:${positions[id].top}%;" onclick="removeCleanItem(${id})" aria-label="うんちを片づける">💩</button>
            `).join("")}
          </div>
          <div class="bubble">${leftIds.length === 0 ? "きれいになりました。" : `残り ${leftIds.length} 個です。`}</div>
        </section>
        <div class="buttons">
          <button class="secondary full" onclick="state.phase='game'; saveState(); render();">戻る</button>
        </div>
      `;
    }


    function statRow(label, value){
      const color = value < 30 ? "var(--bad)" : value < 55 ? "var(--warn)" : "linear-gradient(90deg,var(--good),var(--main))";
      return `
        <div class="stat">
          <span>${label}</span>
          <span class="bar"><i style="width:${value}%; background:${color}"></i></span>
          <span>${value}</span>
        </div>
      `;
    }

    function pick(arr){
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function todayKey(){
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function startOfLocalDay(time){
      const d = new Date(time);
      return new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
    }

    function escapeHtml(str){
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
